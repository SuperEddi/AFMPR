<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Hoja Membretada - Ministerio de la Presidencia</title>
  <style>
    @page {
      size: letter portrait;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Consolas', 'Courier New', monospace;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    html,
    body {
      width: 8.5in;
      min-height: 11in;
      background: #fff;
      overflow: visible;
    }

    .page {
      width: 8.5in;
      min-height: 11in;
      position: relative;
      background: #fff;
      overflow: visible;
      padding: 0.5in;
    }

    /* ── HEXÁGONOS esquina superior derecha ── */
    .hex-deco {
      position: absolute;
      top: 0;
      right: 0;
      width: 2.0in;
      height: auto;
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
    }

    /* ── LOGO ENCABEZADO ── */
    .header-logo {
      position: absolute;
      top: 0.15in;
      left: 0.4in;
      height: 1.2in;
      /* Tamaño mediano estable */
      width: auto;
      z-index: 2;
    }

    /* Linea dorada eliminada */

    /* ── PIE DE PÁGINA ── */

    /* Franja tricolor alineada a la izquierda */
    .footer-stripe {
      position: absolute;
      bottom: 0.6in;
      /* Margen de seguridad para impresoras */
      left: 0.4in;
      /* Alineado con el logo */
      width: 3in;
      height: 8px;
      display: flex;
      z-index: 3;
    }

    .stripe-red {
      flex: 1;
      background: #f18c81;
    }

    .stripe-yel {
      flex: 1;
      background: #fdf5a3;
    }

    .stripe-green {
      flex: 1;
      background: #84bc9c;
    }

    /* Bloque de texto del pie: alineado a la derecha */
    .footer-content {
      position: absolute;
      bottom: 0.6in;
      /* Margen de seguridad para impresoras */
      right: 0.4in;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      z-index: 3;
    }

    .footer-text-block {
      text-align: right;
      line-height: 1.25;
    }

    .footer-title {
      font-size: 9pt;
      font-weight: 900;
      color: #000;
      text-transform: uppercase;
      display: block;
    }

    .footer-addr,
    .footer-phone {
      font-size: 8pt;
      font-weight: 400;
      color: #333;
      display: block;
    }

    @media screen {

      html,
      body {
        background: #777;
        width: auto;
        height: auto;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .page {
        box-shadow: 0 6px 40px rgba(0, 0, 0, 0.4);
        flex-shrink: 0;
      }
    }

    .content-body {
      position: absolute;
      top: 1.8in;
      left: 0.8in;
      right: 0.8in;
      bottom: 1.2in;
      color: #000;
      line-height: 1.5;
      z-index: 5;
    }

    .acta-title {
      text-align: center;
      font-size: 16pt;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 25px;
      border-bottom: 2px solid #000;
      display: inline-block;
      width: 100%;
      padding-bottom: 8px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 5px;
      margin-bottom: 20px;
      font-size: 9pt;
    }

    .info-label {
      font-weight: 900;
      text-transform: uppercase;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 8.5pt;
    }

    .items-table th {
      background: #eee;
      padding: 8px;
      text-align: left;
      border: 1px solid #000;
      font-weight: 900;
      text-transform: uppercase;
    }

    .items-table td {
      padding: 8px;
      border: 1px solid #000;
    }

    .signatures {
      margin-top: 60px;
      display: flex;
      justify-content: space-around;
      text-align: center;
      font-size: 8.5pt;
    }

    .signature-box {
      width: 220px;
      border-top: 1.5px solid #000;
      padding-top: 10px;
    }
  </style>
</head>

    </div>
